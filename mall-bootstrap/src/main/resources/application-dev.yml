# ====================================
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/enterprise_mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123

  data:
    redis:
      host: localhost
      port: 6379
      password:

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

  flyway:
    locations: classpath:db/migration

# 开发环境日志级别
logging:
  level:
    root: INFO
    com.enterprisemall: DEBUG
    org.springframework.security: DEBUG
    org.mybatis: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger{50} - %msg%n"
